apiVersion: v1
kind: Service
metadata:
  name: llamacpp-external
  namespace: monitoring
  labels:
    app: llamacpp
    release: kube-prometheus-stack
spec:
  ports:
    - name: metrics
      port: 8081
      targetPort: 8081
      protocol: TCP
  clusterIP: None
---
apiVersion: v1
kind: Endpoints
metadata:
  name: llamacpp-external
  namespace: monitoring
  labels:
    app: llamacpp
    release: kube-prometheus-stack
subsets:
  - addresses:
      - ip: 192.168.0.74
    ports:
      - name: metrics
        port: 8081
        protocol: TCP