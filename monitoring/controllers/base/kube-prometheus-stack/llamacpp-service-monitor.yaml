apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: llamacpp
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app: llamacpp
  endpoints:
    - port: metrics
      path: /metrics
      interval: 15s
      scrapeTimeout: 10s