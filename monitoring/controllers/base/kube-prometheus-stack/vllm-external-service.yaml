apiVersion: v1
kind: Service
metadata:
  name: vllm-external
  namespace: monitoring
  labels:
    app: vllm
spec:
  ports:
    - name: metrics
      port: 8000
      targetPort: 8000
  clusterIP: None
---
apiVersion: v1
kind: Endpoints
metadata:
  name: vllm-external
  namespace: monitoring
subsets:
  - addresses:
      - ip: 192.168.0.74
    ports:
      - name: metrics
        port: 8000
