apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: postiz
  namespace: postiz
spec:
  ingressClassName: traefik
  tls:
    # Trusted Let's Encrypt cert (issued via Cloudflare DNS-01, see
    # base/postiz/certificate.yaml). Required because LinkedIn OAuth only
    # accepts an HTTPS redirect URL.
    - hosts:
        - postiz.toddpillars.com
      secretName: postiz-tls
  rules:
    # LAN-only host (resolved by local DNS to the Traefik ingress). Deliberately
    # not added to the cloudflared tunnel, so Postiz is not exposed externally.
    - host: postiz.toddpillars.com
      http:
        paths:
          - backend:
              service:
                name: postiz-app
                port:
                  number: 80
            path: /
            pathType: Prefix
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: postiz-temporal-ui
  namespace: postiz
spec:
  ingressClassName: traefik
  rules:
    # LAN-only Temporal operational console. Also kept out of the cloudflared
    # tunnel — internal debugging UI, never exposed externally.
    - host: temporal.toddpillars.com
      http:
        paths:
          - backend:
              service:
                name: postiz-temporal-ui
                port:
                  number: 80
            path: /
            pathType: Prefix
