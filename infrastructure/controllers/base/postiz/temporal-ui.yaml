apiVersion: apps/v1
kind: Deployment
metadata:
  name: postiz-temporal-ui
  namespace: postiz
  labels:
    app: postiz-temporal-ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postiz-temporal-ui
  template:
    metadata:
      labels:
        app: postiz-temporal-ui
    spec:
      containers:
        - name: temporal-ui
          # Temporal's operational console — connects to the frontend gRPC and
          # lets you inspect/retry the workflows Postiz schedules.
          image: docker.io/temporalio/ui:2.52.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: TEMPORAL_ADDRESS
              value: postiz-temporal:7233
            - name: TEMPORAL_UI_PORT
              value: "8080"
            # Allow the UI's browser API calls from its own LAN host.
            - name: TEMPORAL_CORS_ORIGINS
              value: http://temporal.toddpillars.com
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: postiz-temporal-ui
  namespace: postiz
  labels:
    app: postiz-temporal-ui
spec:
  type: ClusterIP
  selector:
    app: postiz-temporal-ui
  ports:
    - name: http
      port: 80
      targetPort: http
