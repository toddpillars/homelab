apiVersion: v1
kind: ConfigMap
metadata:
  name: postiz-postgres-init
  namespace: postiz
data:
  # Postgres official image runs *.sql in this dir once, on first init only.
  # The primary "postiz" database is created by POSTGRES_DB; here we add the two
  # databases Temporal's auto-setup needs (it creates their schemas, not the DBs).
  01-temporal-databases.sql: |
    CREATE DATABASE temporal;
    CREATE DATABASE temporal_visibility;
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postiz-postgres-data
  namespace: postiz
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postiz-postgres
  namespace: postiz
  labels:
    app: postiz-postgres
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: postiz-postgres
  template:
    metadata:
      labels:
        app: postiz-postgres
    spec:
      containers:
        - name: postgres
          image: public.ecr.aws/docker/library/postgres:16-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: postgres
              containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: postiz
            - name: POSTGRES_DB
              value: postiz
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postiz-postgres
                  key: POSTGRES_PASSWORD
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: init
              mountPath: /docker-entrypoint-initdb.d
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "postiz", "-d", "postiz"]
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "postiz", "-d", "postiz"]
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              memory: 512Mi
        - name: exporter
          # Prometheus postgres_exporter (quay — not Docker Hub). Connects to the
          # primary over localhost; credentials from the shared postgres secret.
          image: quay.io/prometheuscommunity/postgres-exporter:v0.20.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: metrics
              containerPort: 9187
          env:
            - name: DATA_SOURCE_URI
              value: localhost:5432/postiz?sslmode=disable
            - name: DATA_SOURCE_USER
              value: postiz
            - name: DATA_SOURCE_PASS
              valueFrom:
                secretKeyRef:
                  name: postiz-postgres
                  key: POSTGRES_PASSWORD
          readinessProbe:
            httpGet:
              path: /
              port: metrics
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              memory: 128Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: postiz-postgres-data
        - name: init
          configMap:
            name: postiz-postgres-init
---
apiVersion: v1
kind: Service
metadata:
  name: postiz-postgres
  namespace: postiz
  labels:
    app: postiz-postgres
spec:
  type: ClusterIP
  selector:
    app: postiz-postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
    - name: metrics
      port: 9187
      targetPort: metrics
