apiVersion: apps/v1
kind: Deployment
metadata:
  name: postiz-redis
  namespace: postiz
  labels:
    app: postiz-redis
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: postiz-redis
  template:
    metadata:
      labels:
        app: postiz-redis
    spec:
      containers:
        - name: valkey
          # Valkey (Redis-compatible fork) pulled from ghcr to avoid Docker Hub.
          image: ghcr.io/valkey-io/valkey:8-alpine
          imagePullPolicy: IfNotPresent
          command: ["valkey-server", "--save", "60", "1", "--appendonly", "yes"]
          ports:
            - name: redis
              containerPort: 6379
          volumeMounts:
            - name: data
              mountPath: /data
          readinessProbe:
            exec:
              command: ["valkey-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["valkey-cli", "ping"]
            initialDelaySeconds: 15
            periodSeconds: 30
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 256Mi
        - name: exporter
          # redis_exporter is Valkey-compatible (quay — not Docker Hub).
          image: quay.io/oliver006/redis_exporter:v1.86.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: metrics
              containerPort: 9121
          env:
            - name: REDIS_ADDR
              value: redis://localhost:6379
          readinessProbe:
            httpGet:
              path: /health
              port: metrics
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              memory: 128Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: postiz-redis-data
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postiz-redis-data
  namespace: postiz
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: postiz-redis
  namespace: postiz
  labels:
    app: postiz-redis
spec:
  type: ClusterIP
  selector:
    app: postiz-redis
  ports:
    - name: redis
      port: 6379
      targetPort: redis
    - name: metrics
      port: 9121
      targetPort: metrics
