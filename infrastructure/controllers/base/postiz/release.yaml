apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: postiz
  namespace: postiz
spec:
  interval: 10m
  chart:
    spec:
      # First chart in this repo sourced from git rather than a HelmRepository:
      # the vendored PR #19 chart lives in-tree, so it is pinned and needs no
      # external chart repo. Bitnami subcharts were removed from Chart.yaml.
      chart: ./infrastructure/controllers/base/postiz/chart
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
      interval: 10m
  values:
    fullnameOverride: postiz-app

    image:
      repository: ghcr.io/gitroomhq/postiz-app
      # PINNED: the LinkedIn scope patch below (command/args) targets the provider
      # file in this image. Re-verify the sed after any image bump — the scope
      # list or file path can change across Postiz versions.
      tag: v2.21.10

    # LinkedIn scope patch: Postiz's personal-LinkedIn provider hard-requests
    # scopes we cannot grant — r_basicprofile (deprecated/ungrantable, superseded
    # by OpenID `profile`) and the r_/w_/rw_organization_* scopes (need LinkedIn's
    # Community Management API, only for company pages). LinkedIn rejects the whole
    # request with unauthorized_scope_error. We strip those four lines from both
    # compiled provider copies before the app starts, leaving openid/profile/
    # w_member_social so personal-profile posting works. Then run the image's
    # original entrypoint (`nginx && pnpm run pm2`).
    command:
      - /bin/sh
      - -c
    args:
      - |
        for f in \
          /app/apps/backend/dist/libraries/nestjs-libraries/src/integrations/social/linkedin.provider.js \
          /app/apps/orchestrator/dist/libraries/nestjs-libraries/src/integrations/social/linkedin.provider.js; do
          [ -f "$f" ] && sed -i "/'r_basicprofile',/d;/'rw_organization_admin',/d;/'w_organization_social',/d;/'r_organization_social',/d" "$f"
        done
        cd /app && nginx && exec pnpm run pm2

    # Bundled Bitnami datastores disabled — we self-host Postgres, Valkey, and
    # Temporal as plain manifests in this namespace (see postgres.yaml /
    # valkey.yaml / temporal.yaml).
    postgresql:
      enabled: false
    redis:
      enabled: false

    secrets:
      autoGenerate:
        enabled: false
        database: false
        redis: false
      # All sensitive values are injected via extraSecrets (postiz-secrets-ext),
      # kept SOPS-encrypted. Nothing sensitive is set here in plaintext.

    extraSecrets:
      - name: postiz-secrets-ext

    env:
      # HTTPS via a trusted Let's Encrypt cert on the ingress. LinkedIn (and most
      # OAuth providers) require an HTTPS redirect URL, which Postiz derives from
      # FRONTEND_URL. Secure cookies now work, so NOT_SECURED is removed.
      FRONTEND_URL: "https://postiz.toddpillars.com"
      NEXT_PUBLIC_BACKEND_URL: "https://postiz.toddpillars.com/api"
      BACKEND_INTERNAL_URL: "http://localhost:3000"
      IS_GENERAL: "true"
      STORAGE_PROVIDER: "local"
      UPLOAD_DIRECTORY: "/uploads"
      NEXT_PUBLIC_UPLOAD_STATIC_DIRECTORY: "/uploads"
      DISABLE_REGISTRATION: "false"
      TEMPORAL_ADDRESS: "postiz-temporal:7233"

    # Persist uploads to a PVC instead of the default emptyDir.
    extraVolumes:
      - name: uploads-volume
        persistentVolumeClaim:
          claimName: postiz-uploads
    extraVolumeMounts:
      - name: uploads-volume
        mountPath: /uploads

    # Ingress is handled by a separate Traefik Ingress in the staging overlay
    # (LAN-only). Chart-managed ingress/httproute stay disabled.
    ingress:
      enabled: false
    httproute:
      enabled: false
