apiVersion: v1
kind: Secret
metadata:
  name: {{ include "postiz.fullname" . }}-secrets
  labels:
    {{- include "postiz.labels" . | nindent 4 }}
  {{- with .Values.secretAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
type: Opaque
data:
  # DATABASE_URL - auto-generated if empty and auto-generation enabled
  {{- $dbUrl := include "postiz.secretDatabaseUrl" . }}
  {{- if $dbUrl }}
  DATABASE_URL: {{ $dbUrl | b64enc | quote }}
  {{- end }}

  # REDIS_URL - auto-generated if empty and auto-generation enabled
  {{- $redisUrl := include "postiz.secretRedisUrl" . }}
  {{- if $redisUrl }}
  REDIS_URL: {{ $redisUrl | b64enc | quote }}
  {{- end }}

  # JWT_SECRET and other manual secrets
  {{- range $key, $value := .Values.secrets }}
  {{- if and (ne $key "autoGenerate") (ne $key "DATABASE_URL") (ne $key "REDIS_URL") (typeIs "string" $value) $value }}
  {{ $key }}: {{ $value | b64enc | quote }}
  {{- end }}
  {{- end }}