apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cert-manager
  namespace: cert-manager
spec:
  interval: 10m
  chart:
    spec:
      chart: cert-manager
      version: v1.20.3
      sourceRef:
        kind: HelmRepository
        name: jetstack
        namespace: flux-system
      interval: 10m
  install:
    crds: Create
  upgrade:
    crds: CreateReplace
  values:
    # Chart also installs the CRDs (belt-and-suspenders with Flux crds handling).
    crds:
      enabled: true
      keep: true
