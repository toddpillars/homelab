apiVersion: v1
kind: ConfigMap
metadata:
  name: gulfside-html
  namespace: gulfside
data:
  index.html: |
    <!DOCTYPE html>
    <html lang="en">
    <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>GulfsideAI</title>
    <script src="https://tally.so/widgets/embed.js"></script>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body { background: #07080f; color: #e8eaf0; font-family: 'Inter', 'Segoe UI', sans-serif; min-height: 100vh; overflow-x: hidden; }
      .bg-orb { position: fixed; border-radius: 50%; filter: blur(110px); pointer-events: none; z-index: 0; }
      .orb-1 { width: 600px; height: 600px; background: rgba(255,100,20,0.13); top: -120px; right: -100px; }
      .orb-2 { width: 500px; height: 500px; background: rgba(60,30,120,0.22); bottom: 60px; left: -80px; }
      .orb-3 { width: 350px; height: 350px; background: rgba(255,140,40,0.07); top: 40%; left: 50%; transform: translateX(-50%); }
      .grid-overlay { position: fixed; inset: 0; z-index: 0; background-image: linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px); background-size: 60px 60px; pointer-events: none; }
      .wrapper { position: relative; z-index: 1; min-height: 100vh; display: flex; flex-direction: column; }
      nav { display: flex; align-items: center; justify-content: center; padding: 28px 48px; border-bottom: 1px solid rgba(255,255,255,0.06); backdrop-filter: blur(8px); }
      .logo { font-size: 20px; font-weight: 600; letter-spacing: 0.04em; color: #f0f2f8; display: flex; align-items: center; gap: 10px; }
      .logo-icon { width: 32px; height: 32px; border-radius: 8px; background: linear-gradient(135deg, #ff6a1a, #c8380a); display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; color: #fff; flex-shrink: 0; }
      .hero { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 80px 32px 60px; gap: 28px; }
      .eyebrow { font-size: 12px; font-weight: 500; letter-spacing: 0.18em; text-transform: uppercase; color: #ff7833; border: 1px solid rgba(255,120,51,0.3); padding: 6px 16px; border-radius: 100px; }
      .hero-heading { font-size: clamp(40px, 6vw, 76px); font-weight: 700; line-height: 1.08; letter-spacing: -0.02em; color: #f0f2f8; max-width: 820px; }
      .hero-heading span { background: linear-gradient(135deg, #ff7833, #ffb347); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
      .hero-sub { font-size: 18px; line-height: 1.65; color: rgba(220,225,240,0.55); max-width: 520px; }
      .hero-cta { display: flex; gap: 14px; flex-wrap: wrap; justify-content: center; margin-top: 8px; }
      .btn-primary { background: linear-gradient(135deg, #ff6a1a, #c8380a); color: #fff; border: none; padding: 14px 32px; font-size: 15px; font-weight: 600; border-radius: 100px; cursor: pointer; transition: opacity 0.2s, transform 0.15s; text-decoration: none; display: inline-block; }
      .btn-primary:hover { opacity: 0.88; transform: translateY(-1px); }
      .btn-ghost { background: transparent; color: rgba(220,225,240,0.7); border: 1px solid rgba(255,255,255,0.15); padding: 14px 32px; font-size: 15px; font-weight: 500; border-radius: 100px; cursor: pointer; transition: background 0.2s, transform 0.15s; text-decoration: none; display: inline-block; }
      .btn-ghost:hover { background: rgba(255,255,255,0.06); transform: translateY(-1px); }
      .stats-bar { display: flex; justify-content: center; border-top: 1px solid rgba(255,255,255,0.06); border-bottom: 1px solid rgba(255,255,255,0.06); }
      .stat { flex: 1; max-width: 200px; padding: 28px 20px; text-align: center; border-right: 1px solid rgba(255,255,255,0.06); }
      .stat:last-child { border-right: none; }
      .stat-num { font-size: 28px; font-weight: 700; color: #f0f2f8; letter-spacing: -0.02em; }
      .stat-num span { color: #ff7833; }
      .stat-label { font-size: 12px; color: rgba(220,225,240,0.4); margin-top: 4px; letter-spacing: 0.04em; text-transform: uppercase; }
      .cards-section { padding: 72px 48px; max-width: 1100px; margin: 0 auto; width: 100%; }
      .section-label { font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; color: rgba(220,225,240,0.35); text-align: center; margin-bottom: 40px; }
      .cards-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; }
      .card { background: rgba(255,255,255,0.032); border: 1px solid rgba(255,255,255,0.08); border-radius: 16px; padding: 28px 26px; position: relative; overflow: hidden; transition: border-color 0.2s, background 0.2s; }
      .card:hover { border-color: rgba(255,120,51,0.3); background: rgba(255,255,255,0.05); }
      .card-accent { position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, #ff6a1a, transparent); opacity: 0; transition: opacity 0.2s; }
      .card:hover .card-accent { opacity: 1; }
      .card-featured { border-color: rgba(255,120,51,0.25); background: rgba(255,106,26,0.06); }
      .card-featured .card-accent { opacity: 1; }
      .card-featured:hover { border-color: rgba(255,120,51,0.5); background: rgba(255,106,26,0.1); }
      .card-badge { display: inline-block; font-size: 10px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: #ff7833; border: 1px solid rgba(255,120,51,0.35); padding: 3px 10px; border-radius: 100px; margin-bottom: 14px; }
      .card-icon { width: 40px; height: 40px; border-radius: 10px; background: rgba(255,106,26,0.15); border: 1px solid rgba(255,106,26,0.25); display: flex; align-items: center; justify-content: center; margin-bottom: 18px; }
      .card h3 { font-size: 16px; font-weight: 600; color: #e8eaf0; margin-bottom: 8px; letter-spacing: -0.01em; }
      .card p { font-size: 14px; line-height: 1.65; color: rgba(220,225,240,0.45); }
      .contact-section { padding: 72px 48px 80px; max-width: 780px; margin: 0 auto; width: 100%; }
      .contact-header { text-align: center; margin-bottom: 48px; }
      .contact-header h2 { font-size: clamp(28px, 4vw, 42px); font-weight: 700; letter-spacing: -0.02em; color: #f0f2f8; margin-bottom: 12px; line-height: 1.15; }
      .contact-header h2 span { background: linear-gradient(135deg, #ff7833, #ffb347); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
      .contact-header p { font-size: 16px; color: rgba(220,225,240,0.45); line-height: 1.6; }
      .contact-card { background: rgba(255,255,255,0.032); border: 1px solid rgba(255,255,255,0.08); border-radius: 20px; padding: 40px 40px 32px; position: relative; overflow: hidden; }
      .contact-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, #ff6a1a, rgba(255,106,26,0.2), transparent); }
      footer { text-align: center; padding: 28px; font-size: 12px; color: rgba(220,225,240,0.2); border-top: 1px solid rgba(255,255,255,0.05); letter-spacing: 0.04em; }
    </style>
    </head>
    <body>
    
    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>
    <div class="bg-orb orb-3"></div>
    <div class="grid-overlay"></div>
    
    <div class="wrapper">
      <nav>
        <div class="logo">
          <div class="logo-icon">G</div>
          GulfsideAI
        </div>
      </nav>
    
      <section class="hero">
        <div class="eyebrow">AI-Powered Business Solutions</div>
        <h1 class="hero-heading">
          Intelligent agents for<br><span>the next wave of work</span>
        </h1>
        <p class="hero-sub">
          We help organizations move faster, work smarter, and scale further with practical AI — built for real workflows, not just demos.
        </p>
        <div class="hero-cta">
          <a href="#contact" class="btn-primary">Get Started</a>
          <a href="#services" class="btn-ghost">Learn More</a>
        </div>
      </section>
    
      <div class="stats-bar">
        <div class="stat"><div class="stat-num">10<span>×</span></div><div class="stat-label">Productivity Lift</div></div>
        <div class="stat"><div class="stat-num"><span>∞</span></div><div class="stat-label">Scalability</div></div>
        <div class="stat"><div class="stat-num">24<span>/7</span></div><div class="stat-label">Always On</div></div>
        <div class="stat"><div class="stat-num">100<span>%</span></div><div class="stat-label">Human-Led</div></div>
      </div>
    
      <section class="cards-section" id="services">
        <div class="section-label">What we do</div>
        <div class="cards-grid">
    
          <div class="card">
            <div class="card-accent"></div>
            <div class="card-icon">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#ff7833" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/></svg>
            </div>
            <h3>AI Workflow Integration</h3>
            <p>Map your existing processes to AI-augmented pipelines that reduce manual overhead and surface better decisions, faster.</p>
          </div>
    
          <div class="card">
            <div class="card-accent"></div>
            <div class="card-icon">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#ff7833" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
            </div>
            <h3>Team Enablement</h3>
            <p>Hands-on training that turns AI skeptics into power users — role-specific, practical, and built around your actual tools.</p>
          </div>
    
          <div class="card">
            <div class="card-accent"></div>
            <div class="card-icon">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#ff7833" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
            </div>
            <h3>Strategic Advisory</h3>
            <p>Long-term AI roadmapping for leadership — from policy and governance to identifying your highest-leverage automation opportunities.</p>
          </div>
    
          <div class="card card-featured">
            <div class="card-accent"></div>
            <div class="card-badge">Now Available</div>
            <div class="card-icon">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#ff7833" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
            </div>
            <h3>Applied AI Engineering</h3>
            <p>From agent deployment to cloud-native infrastructure — we get into the stack and make it run. MCP integrations, local LLM pipelines, agentic workflows, and the AIOps layer to keep it all production-ready.</p>
          </div>
    
        </div>
      </section>
    
      <section class="contact-section" id="contact">
        <div class="contact-header">
          <h2>Let's build something <span>together</span></h2>
          <p>Tell us about your goals and we'll reach out within one business day.</p>
        </div>
        <div class="contact-card">
          <iframe
            data-tally-src="https://tally.so/embed/ja9LP9?alignLeft=1&hideTitle=1&transparentBackground=1&dynamicHeight=1"
            loading="lazy"
            width="100%"
            height="350"
            frameborder="0"
            marginheight="0"
            marginwidth="0"
            title="Contact Us">
          </iframe>
        </div>
      </section>
    
      <footer>© 2026 GulfsideAI · Tampa Bay, FL</footer>
    </div>
    
    <script>
      if (window.Tally) { Tally.loadEmbeds(); }
      else { document.querySelector('script[src*="tally"]').addEventListener('load', () => Tally.loadEmbeds()); }
    </script>
    
    </body>
    </html>
    