apiVersion: apps/v1
kind: Deployment
metadata:
  name: gulfside-website
  namespace: gulfside
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gulfside-website
  template:
    metadata:
      labels:
        app: gulfside-website
    spec:
      containers:
        - name: nginx
          image: nginx:alpine
          ports:
            - containerPort: 80
              name: http
          volumeMounts:
            - name: html
              mountPath: /usr/share/nginx/html
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
      volumes:
        - name: html
          configMap:
            name: gulfside-html
