apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: hermes-agent
  namespace: hermes-agent
spec:
  ingressClassName: traefik
  rules:
    - host: hermes.toddpillars.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: hermes-agent
                port:
                  number: 9119
